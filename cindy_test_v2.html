<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Parhaylikhay · Quadratic Explorer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: #1e1f1e;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100%;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      gap: 12px;
    }

    .header {
      color: #f5f5f3;
      font-size: 14px;
      font-weight: 500;
      text-align: center;
    }

    .subheader {
      color: #888780;
      font-size: 12px;
      text-align: center;
      margin-top: 2px;
    }

    #CSCanvas {
      border: 1.5px solid #3b9ef5;
      border-radius: 10px;
      display: block;
      cursor: pointer;
      touch-action: none;
      pointer-events: all;
      user-select: none;
      -webkit-user-select: none;
    }

    .tip {
      background: #2a2a28;
      border-radius: 8px;
      padding: 10px 14px;
      max-width: 500px;
      width: 100%;
    }

    .tip p {
      color: #b4b2a9;
      font-size: 12px;
      line-height: 1.6;
      margin-bottom: 4px;
    }

    .tip p:last-child { margin-bottom: 0; }
    .tip span { color: #f5c842; font-weight: 500; }
    .tip .green { color: #3ecf7a; }
  </style>
</head>
<body>

  <div>
    <div class="header">Quadratic Graph Explorer</div>
    <div class="subheader">Drag the coloured dots up/down to change a, b, and c</div>
  </div>

  <div id="CSCanvas"></div>

  <div class="tip">
    <p><span>a</span> — width and direction of parabola &nbsp;|&nbsp; <span>b</span> — shifts axis of symmetry &nbsp;|&nbsp; <span>c</span> — y-intercept</p>
    <p class="green">Cambridge tip: y-intercept is always (0, c) — state this clearly for 1 mark.</p>
  </div>

  <script src="https://cindyjs.org/dist/latest/Cindy.js"></script>
  <script>
    var W = 500, H = 420;

    var cdy = CindyJS({
      ports: [{
        id: "CSCanvas",
        width: W,
        height: H,
        transform: [{ visibleRect: [-5.5, -4.8, 5.5, 4.8] }]
      }],
      geometry: [
        { name:"A", kind:"P", type:"Free", pos:[-3.5, -1.5], color:[0.231,0.620,0.961], size:10 },
        { name:"B", kind:"P", type:"Free", pos:[0,   -1.5], color:[0.961,0.784,0.259], size:10 },
        { name:"C", kind:"P", type:"Free", pos:[3.5,  -1.5], color:[0.910,0.333,0.239], size:10 }
      ],
      scripts: {
        init: `
          A.x := -3.5;
          B.x := 0;
          C.x := 3.5;
        `,
        draw: `
          background((0.118, 0.122, 0.118));

          // Grid
          linesize(0.3);
          color((0.2, 0.2, 0.196));
          forall(-5..5, k,
            draw((-5.5, k), (5.5, k));
            draw((k, -4.8), (k, 4.8));
          );

          // Axes
          linesize(1.2);
          color((0.45, 0.45, 0.43));
          draw((-5.5, 0), (5.5, 0));
          draw((0, -4.8), (0, 4.8));

          // Axis labels
          color((0.55, 0.55, 0.53));
          drawtext((5.0, 0.25), "x", size->11);
          drawtext((0.2, 4.4), "y", size->11);

          // Lock x positions of sliders
          A.x := -3.5;
          B.x := 0;
          C.x := 3.5;

          // Map y position to integer parameter (-3 to 3)
          def(a_val, round(clamp(A.y * 1.2, -3, 3)));
          def(b_val, round(clamp(B.y * 1.2, -3, 3)));
          def(c_val, round(clamp(C.y * 1.2, -3, 3)));

          // Slider tracks
          linesize(0.8);
          color((0.3, 0.3, 0.29));
          draw((-3.5, -3), (-3.5, 3));
          draw((0, -3), (0, 3));
          draw((3.5, -3), (3.5, 3));

          // Slider tick marks
          forall(-3..3, k,
            draw((-3.7, k), (-3.3, k));
            draw((-0.2, k), (0.2, k));
            draw((3.3, k), (3.7, k));
          );

          // Slider labels
          color((0.706, 0.706, 0.659));
          drawtext((-4.2, 3.4), "a", size->13);
          drawtext((-0.5, 3.4), "b", size->13);
          drawtext((3.1, 3.4), "c", size->13);

          // Current values
          color((0.231, 0.620, 0.961));
          drawtext((-4.3, A.y), "" + a_val, size->11);
          color((0.961, 0.784, 0.259));
          drawtext((-0.6, B.y), "" + b_val, size->11);
          color((0.910, 0.333, 0.239));
          drawtext((2.9, C.y), "" + c_val, size->11);

          // Parabola
          if(a_val != 0,
            linesize(2.5);
            color((0.231, 0.620, 0.961));
            connect(apply(-50..50, t,
              def(x, t * 0.1);
              (x, a_val * x^2 + b_val * x + c_val)
            ));
          ,
            if(b_val != 0,
              linesize(2.5);
              color((0.231, 0.620, 0.961));
              def(y_left, b_val * (-5.5) + c_val);
              def(y_right, b_val * 5.5 + c_val);
              draw((-5.5, y_left), (5.5, y_right));
            ,
              linesize(2.5);
              color((0.231, 0.620, 0.961));
              draw((-5.5, c_val), (5.5, c_val));
            );
          );

          // Equation display
          color((0.961, 0.961, 0.949));
          drawtext((-5.3, 4.3),
            "y = " + a_val + "x² + " + b_val + "x + " + c_val,
            size->13
          );

          // Y-intercept dot and label
          color((0.243, 0.812, 0.478));
          pointsize(7);
          draw((0, c_val));
          drawtext((0.2, c_val + 0.3), "(0, " + c_val + ")", size->10);
        `
      }
    });

    // Force pointer events on the canvas element after init
    window.addEventListener('load', function() {
      var canvas = document.querySelector('#CSCanvas canvas');
      if (canvas) {
        canvas.style.pointerEvents = 'all';
        canvas.style.touchAction = 'none';
      }
    });
  </script>

</body>
</html>
