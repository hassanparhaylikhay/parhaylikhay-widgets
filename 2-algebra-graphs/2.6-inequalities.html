<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Parhaylikhay · Inequalities</title>
  <meta property="og:title" content="Inequalities"/>
  <meta property="og:type" content="video.other"/>
  <meta property="og:video:type" content="text/html"/>
  <meta property="og:video:width" content="600"/>
  <meta property="og:video:height" content="460"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"/>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" onload="renderMathInElement(document.body,{delimiters:[{left:'\\(',right:'\\)',display:false}]})"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #0d1216;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; flex-direction: column; align-items: center;
    }
    .header { width: 560px; padding: 14px 4px 6px; }
    .title { color: #00abfa; font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .instruction { color: #b4b2a9; font-size: 13px; line-height: 1.5; }
    .equation-bar {
      width: 560px; padding: 6px 4px;
      font-family: 'Courier New', monospace; font-size: 18px;
      color: #f0f0ee; min-height: 34px; line-height: 1.6;
    }
    canvas { display: block; cursor: default; }
    .sign-row {
      width: 560px; display: flex; gap: 0;
      background: #111f2c; border: 1px solid #1a2535;
      border-radius: 6px; overflow: hidden; margin: 6px 0;
    }
    .sign-btn {
      flex: 1; padding: 8px 0; text-align: center; font-size: 16px;
      cursor: pointer; color: #6a8898; background: none; border: none;
      font-family: 'Courier New', monospace; transition: all 0.15s;
    }
    .sign-btn.active { background: #00abfa22; color: #00abfa; font-weight: 700; }
    .sliders {
      width: 560px; display: flex; flex-direction: column;
      gap: 9px; padding: 10px 4px;
      border-top: 1px solid #1a2535; border-bottom: 1px solid #1a2535;
    }
    .slider-row { display: flex; align-items: center; gap: 10px; }
    .slider-label { font-family: 'Courier New', monospace; font-size: 13px; width: 80px; flex-shrink: 0; }
    input[type="range"] {
      flex: 1; height: 4px; -webkit-appearance: none;
      background: #1e2e3e; border-radius: 2px; outline: none; cursor: pointer;
    }
    #sl-a::-webkit-slider-thumb { -webkit-appearance:none; width:15px; height:15px; border-radius:50%; background:#00abfa; cursor:pointer; }
    #sl-b::-webkit-slider-thumb { -webkit-appearance:none; width:15px; height:15px; border-radius:50%; background:#fff067; cursor:pointer; }
    #sl-c::-webkit-slider-thumb { -webkit-appearance:none; width:15px; height:15px; border-radius:50%; background:#0fee89; cursor:pointer; }
    .slider-bounds { color: #3a4a5a; font-size: 11px; width: 46px; text-align: right; flex-shrink: 0; }
    .footer { width: 560px; padding: 8px 4px 14px; }
    .tip { color: #0fee89; font-size: 13px; line-height: 1.7; }
    .tip strong { font-weight: 600; }
    .kfrac { display:inline-flex; flex-direction:column; align-items:center; vertical-align:middle; gap:0; line-height:1.15; margin:0 3px; }
    .kfrac .knum { border-bottom:2px solid currentColor; padding:1px 4px; text-align:center; font-size:0.88em; }
    .kfrac .kden { padding:1px 4px; text-align:center; font-size:0.88em; }
  </style>
</head>
<body>

<div class="header">
  <div class="title">Inequalities</div>
  <div class="instruction">
    Solve <b style="color:#00abfa">a</b>x + <b style="color:#fff067">b</b>
    <span id="sign-display" style="color:#00abfa">≤</span>
    <b style="color:#0fee89">c</b> — or drag the <b style="color:#00abfa">boundary dot</b> to explore
  </div>
</div>

<div class="equation-bar" id="eq-display"></div>

<div class="sign-row">
  <button class="sign-btn" id="btn-lt" onclick="setSign('lt')">&lt;</button>
  <button class="sign-btn active" id="btn-le" onclick="setSign('le')">≤</button>
  <button class="sign-btn" id="btn-gt" onclick="setSign('gt')">&gt;</button>
  <button class="sign-btn" id="btn-ge" onclick="setSign('ge')">≥</button>
</div>

<canvas id="graph" width="560" height="160"></canvas>

<div class="sliders">
  <div class="slider-row">
    <div class="slider-label" style="color:#00abfa" id="lbl-a">a =  2.00</div>
    <input type="range" id="sl-a" min="-6" max="6" step="0.01" value="2"/>
    <div class="slider-bounds">−6 … 6</div>
  </div>
  <div class="slider-row">
    <div class="slider-label" style="color:#fff067" id="lbl-b">b =  1.00</div>
    <input type="range" id="sl-b" min="-10" max="10" step="0.01" value="1"/>
    <div class="slider-bounds">−10 … 10</div>
  </div>
  <div class="slider-row">
    <div class="slider-label" style="color:#0fee89" id="lbl-c">c =  9.00</div>
    <input type="range" id="sl-c" min="-20" max="20" step="0.01" value="9"/>
    <div class="slider-bounds">−20 … 20</div>
  </div>
</div>

<div class="footer">
  <div class="tip">
    Cambridge tip: <strong>dividing or multiplying by a negative flips the inequality sign</strong> —
    this is the #1 error. The mark scheme will not accept the correct number with the wrong sign.
  </div>
</div>

<script>
  var a=2, b=1, c=9, sign='le';
  var SIGNS={lt:'<', le:'≤', gt:'>', ge:'≥'};
  var SPRING=0.14;
  var dragging=false, hovering=false;
  var HIT=18;

  // Spring-animated boundary x
  var xBound=4.0, xBoundT=4.0;

  var canvas=document.getElementById('graph');
  var ctx=canvas.getContext('2d');
  var W=560, H=160;
  var DPR=window.devicePixelRatio||1;
  canvas.width=W*DPR; canvas.height=H*DPR;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  ctx.scale(DPR,DPR);

  var LINE_Y=H/2+8, LINE_PAD=50;

  function setSign(s){
    sign=s;
    ['lt','le','gt','ge'].forEach(function(k){
      document.getElementById('btn-'+k).classList.toggle('active',k===s);
    });
    document.getElementById('sign-display').textContent=SIGNS[s];
  }

  function solve(){
    if (Math.abs(a)<0.005) return null;
    var rhs=(c-b)/a;
    var fs=sign;
    if (a<0) fs={lt:'gt',le:'ge',gt:'lt',ge:'le'}[sign];
    return {x:rhs, sign:fs};
  }

  function fmt(v){
    var r=Math.round(v*100)/100;
    if(Math.abs(r)<0.005)return'0';
    return r%1===0?String(r):r.toFixed(2);
  }

  function getPos(e){
    var r=canvas.getBoundingClientRect();
    var cx=e.touches?e.touches[0].clientX:e.clientX;
    var cy=e.touches?e.touches[0].clientY:e.clientY;
    return{x:(cx-r.left)*W/r.width,y:(cy-r.top)*H/r.height};
  }

  function getRange(){
    var sol=solve();
    var center=sol?sol.x:0;
    var range=Math.max(8,Math.abs(center)+5);
    return{lo:Math.floor(center-range), hi:Math.ceil(center+range)};
  }

  function toLineX(v,lo,hi){return LINE_PAD+(v-lo)/(hi-lo)*(W-2*LINE_PAD);}
  function fromLineX(px,lo,hi){return lo+(px-LINE_PAD)/(W-2*LINE_PAD)*(hi-lo);}

  function dotCanvasPos(){
    var rng=getRange();
    return{x:toLineX(xBound,rng.lo,rng.hi),y:LINE_Y};
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#0d1216'; ctx.fillRect(0,0,W,H);

    var sol=solve();
    if(!sol){
      ctx.fillStyle='#ff4670'; ctx.font='14px Courier New, monospace';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('a = 0: no solution', W/2, H/2);
      return;
    }

    var rng=getRange();
    var LO=rng.lo, HI=rng.hi;
    var toX=function(v){return toLineX(v,LO,HI);};
    var finalSign=sol.sign;
    var isGt=(finalSign==='gt'||finalSign==='ge');
    var closed=(finalSign==='le'||finalSign==='ge');
    var dotX=toX(xBound);

    // Axis line
    ctx.strokeStyle='#3a5060'; ctx.lineWidth=2; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(LINE_PAD,LINE_Y); ctx.lineTo(W-LINE_PAD,LINE_Y); ctx.stroke();

    // Arrowheads
    ctx.fillStyle='#3a5060';
    ctx.beginPath(); ctx.moveTo(W-LINE_PAD,LINE_Y); ctx.lineTo(W-LINE_PAD-9,LINE_Y-5); ctx.lineTo(W-LINE_PAD-9,LINE_Y+5); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(LINE_PAD,LINE_Y); ctx.lineTo(LINE_PAD+9,LINE_Y-5); ctx.lineTo(LINE_PAD+9,LINE_Y+5); ctx.closePath(); ctx.fill();

    // Tick marks
    ctx.fillStyle='#5a7888'; ctx.font='14px sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='top';
    for(var i=LO;i<=HI;i++){
      if(i%2!==0)continue;
      var tx=toX(i);
      if(tx<LINE_PAD||tx>W-LINE_PAD)continue;
      ctx.strokeStyle='#1e2e3e'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(tx,LINE_Y-5); ctx.lineTo(tx,LINE_Y+5); ctx.stroke();
      ctx.fillText(String(i),tx,LINE_Y+7);
    }

    // Shaded region
    ctx.fillStyle='#00abfa22';
    if(isGt){
      ctx.fillRect(dotX,LINE_Y-8,W-LINE_PAD-dotX,16);
    } else {
      ctx.fillRect(LINE_PAD,LINE_Y-8,dotX-LINE_PAD,16);
    }

    // Direction arrow on shaded side
    ctx.fillStyle='#00abfa55';
    if(isGt){
      ctx.beginPath(); ctx.moveTo(W-LINE_PAD-5,LINE_Y); ctx.lineTo(W-LINE_PAD-16,LINE_Y-6); ctx.lineTo(W-LINE_PAD-16,LINE_Y+6); ctx.closePath(); ctx.fill();
    } else {
      ctx.beginPath(); ctx.moveTo(LINE_PAD+5,LINE_Y); ctx.lineTo(LINE_PAD+16,LINE_Y-6); ctx.lineTo(LINE_PAD+16,LINE_Y+6); ctx.closePath(); ctx.fill();
    }

    // ── Boundary dot (draggable) ──────────────────────────────────────
    var r2=dragging?9:(hovering?8:6);
    var gr2=dragging?22:(hovering?18:14);
    var grad=ctx.createRadialGradient(dotX,LINE_Y,0,dotX,LINE_Y,gr2);
    grad.addColorStop(0,'rgba(0,171,250,0.30)'); grad.addColorStop(1,'rgba(0,171,250,0)');
    ctx.fillStyle=grad;
    ctx.beginPath(); ctx.arc(dotX,LINE_Y,gr2,0,Math.PI*2); ctx.fill();

    ctx.beginPath(); ctx.arc(dotX,LINE_Y,r2,0,Math.PI*2);
    if(closed){
      ctx.fillStyle=dragging?'#40cbff':'#00abfa'; ctx.fill();
    } else {
      ctx.fillStyle='#0d1216'; ctx.fill();
      ctx.strokeStyle=dragging?'#40cbff':'#00abfa'; ctx.lineWidth=2.5; ctx.stroke();
    }

    // Value label above dot
    ctx.fillStyle='#fff067'; ctx.font='bold 15px Courier New, monospace';
    ctx.textAlign='center'; ctx.textBaseline='bottom';
    ctx.fillText(fmt(xBound), dotX, LINE_Y-12);

    // Included/excluded label below
    ctx.fillStyle='#5a7888'; ctx.font='13px sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.fillText(closed?'● included':'○ excluded', dotX, LINE_Y+28);

    // Flip warning
    if(a<0){
      ctx.fillStyle='#ff4670'; ctx.font='bold 14px sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='top';
      ctx.fillText('⚠ sign flipped — divided by negative', W/2, LINE_Y-42);
    }
  }

  function buildEqBar(){
    var sol=solve();
    var aStr=(Math.abs(a-1)<0.01)?'':(Math.abs(a+1)<0.01)?'−':fmt(a);
    var bPart=(b>=0)?' + '+fmt(b):' − '+fmt(Math.abs(b));
    var eq=aStr+'x'+bPart+' '+SIGNS[sign]+' '+fmt(c);
    if(!sol)return eq+'   →   no solution';
    var flip=a<0?' (sign flipped)':'';
    return eq+'   →   x '+SIGNS[sol.sign]+' '+fmt(sol.x)+flip;
  }

  function tick(){
    var sol=solve();
    if(!dragging&&sol!==null) xBoundT=sol.x;
    xBound+=(xBoundT-xBound)*(dragging?0.85:SPRING);

    draw();
    document.getElementById('eq-display').textContent=buildEqBar();
    requestAnimationFrame(tick);
  }

  // Mouse drag
  canvas.addEventListener('mousedown',function(e){
    var p=getPos(e), dp=dotCanvasPos();
    var dx=p.x-dp.x, dy=p.y-dp.y;
    if(dx*dx+dy*dy<HIT*HIT){dragging=true; e.preventDefault();}
  });
  canvas.addEventListener('mousemove',function(e){
    var p=getPos(e);
    if(dragging){
      var rng=getRange();
      var newX=fromLineX(p.x,rng.lo,rng.hi);
      xBoundT=newX; xBound=newX;
      // Back-calculate c from boundary: c = a*xBound + b
      if(Math.abs(a)>0.005){
        var newC=a*newX+b;
        if(newC>=-20&&newC<=20){
          c=newC;
          document.getElementById('sl-c').value=newC.toFixed(2);
          document.getElementById('lbl-c').textContent='c = '+newC.toFixed(2);
        }
      }
    } else {
      var dp=dotCanvasPos(); var dx=p.x-dp.x,dy=p.y-dp.y;
      hovering=(dx*dx+dy*dy<HIT*HIT);
      canvas.style.cursor=hovering?'grab':'default';
    }
  });
  canvas.addEventListener('mouseup',function(){dragging=false; canvas.style.cursor=hovering?'grab':'default';});
  canvas.addEventListener('mouseleave',function(){dragging=false; hovering=false;});

  // Touch drag
  canvas.addEventListener('touchstart',function(e){
    var p=getPos(e), dp=dotCanvasPos(); var dx=p.x-dp.x,dy=p.y-dp.y;
    if(dx*dx+dy*dy<HIT*HIT){dragging=true;e.preventDefault();}
  },{passive:false});
  canvas.addEventListener('touchmove',function(e){
    if(!dragging)return; e.preventDefault();
    var p=getPos(e);
    var rng=getRange();
    var newX=fromLineX(p.x,rng.lo,rng.hi);
    xBoundT=newX; xBound=newX;
    if(Math.abs(a)>0.005){
      var newC=a*newX+b;
      if(newC>=-20&&newC<=20){
        c=newC;
        document.getElementById('sl-c').value=newC.toFixed(2);
        document.getElementById('lbl-c').textContent='c = '+newC.toFixed(2);
      }
    }
  },{passive:false});
  canvas.addEventListener('touchend',function(){dragging=false;});

  // Sliders
  [
    {id:'a',ref:function(v){a=v;},letter:'a',color:'#00abfa'},
    {id:'b',ref:function(v){b=v;},letter:'b',color:'#fff067'},
    {id:'c',ref:function(v){c=v;},letter:'c',color:'#0fee89'},
  ].forEach(function(s){
    document.getElementById('sl-'+s.id).oninput=function(){
      var v=parseFloat(this.value); s.ref(v);
      document.getElementById('lbl-'+s.id).textContent=s.letter+' = '+v.toFixed(2);
      document.getElementById('lbl-'+s.id).style.color=s.color;
    };
  });

  tick();
</script>
</body>
</html>
